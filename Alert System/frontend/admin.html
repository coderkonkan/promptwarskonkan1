<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Admin - Alerts Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f0f1a; color: white; display: flex; justify-content: center; padding: 40px; }
        .admin-panel { width: 100%; max-width: 600px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { margin-top: 0; color: #00c6ff; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a2e; color: white; box-sizing: border-box; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-broadcast { background: #00c6ff; color: white; margin-bottom: 10px; }
        .btn-emergency { background: #ff4d4d; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .status-msg { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>Admin Alerts Control</h1>
        <p>Broadcast manual notifications or trigger facility-wide emergency alerts.</p>

        <div class="form-group">
            <label>Message</label>
            <textarea id="msg" rows="3" placeholder="Enter broadcast message..."></textarea>
        </div>

        <div class="form-group">
            <label>Priority</label>
            <select id="priority">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
            </select>
        </div>

        <div class="form-group">
            <label>Suggested Action</label>
            <input type="text" id="action" placeholder="What should users do?">
        </div>

        <button class="btn btn-broadcast" onclick="sendBroadcast()">Send Manual Broadcast</button>
        <button class="btn btn-emergency" onclick="triggerEmergency()">🚨 TRIGGER EMERGENCY MODE 🚨</button>

        <div id="status" class="status-msg"></div>
    </div>

    <script>
        const socket = new WebSocket('ws://localhost:3003');
        
        socket.onopen = () => console.log('Admin connected to Alerts Hub');

        function sendBroadcast() {
            const msg = document.getElementById('msg').value;
            const priority = document.getElementById('priority').value;
            const action = document.getElementById('action').value;

            if (!msg) return alert("Please enter a message.");

            socket.send(JSON.stringify({
                type: 'MANUAL_BROADCAST',
                message: msg,
                priority: priority,
                action: action
            }));

            showStatus("Broadcast sent successfully!", "#00c6ff");
        }

        function triggerEmergency() {
            if (confirm("WARNING: This will trigger an Emergency Alert for ALL users. Proceed?")) {
                socket.send(JSON.stringify({ type: 'EMERGENCY_TRIGGER' }));
                showStatus("EMERGENCY SIGNAL BROADCASTED", "#ff4d4d");
            }
        }

        function showStatus(text, color) {
            const status = document.getElementById('status');
            status.innerText = text;
            status.style.display = 'block';
            status.style.background = color;
            setTimeout(() => status.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
