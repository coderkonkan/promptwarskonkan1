<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadium Smart Queue Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Real-time Alerts Module -->
    <link rel="stylesheet" href="http://localhost:3003/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>STADIUM<span>QUEUE</span></h1>
            <div id="simulation-status" class="badge">Match in Progress</div>
        </div>
    </header>

    <main>
        <section id="recommendations" class="recommendation-panel">
            <h3><span class="icon">✨</span> Smart Suggestion</h3>
            <div id="suggestion-content">Analyzing queue data for best options...</div>
        </section>

        <section class="controls">
            <div class="tabs">
                <button class="tab-btn active" data-filter="all">All</button>
                <button class="tab-btn" data-filter="food">Food</button>
                <button class="tab-btn" data-filter="washroom">Washrooms</button>
                <button class="tab-btn" data-filter="merchandise">Merch</button>
            </div>
            <div class="sort-options">
                <select id="sort-select">
                    <option value="wait">Sort by Wait Time</option>
                    <option value="length">Sort by Queue Length</option>
                </select>
            </div>
        </section>

        <div id="queue-grid" class="queue-grid">
            <!-- Cards will be injected here -->
            <div class="loading">Loading real-time data...</div>
        </div>
    </main>

    <!-- Pre-order Modal -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2>Digital Token System</h2>
            <div id="modal-body">
                <p>Order from <strong id="modal-stall-name"></strong></p>
                <button id="confirm-order" class="primary-btn">Generate Token & Skip Queue</button>
                <button id="close-modal" class="secondary-btn">Cancel</button>
            </div>
            <div id="order-result" class="hidden">
                <div class="token-card">
                    <span class="token-label">YOUR TOKEN</span>
                    <span id="token-code" class="token-code">---</span>
                    <p id="pickup-time"></p>
                </div>
                <button id="finish-order" class="primary-btn">Got it!</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- Real-time Alerts Module -->
    <script src="http://localhost:3003/alerts.js"></script>
</body>
</html>
